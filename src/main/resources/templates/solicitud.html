<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Solicitud de Servicio</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .entidad { margin-bottom: 10px; }
    </style>
</head>
<body>
<h1>Formulario de Solicitud</h1>
<form th:action="@{/solicitud}" method="post">
    <div th:each="entidad : ${entidades}" class="entidad">
        <label th:text="${entidad} + ':'"></label>
        <input type="number" th:name="${entidad}" value="0" min="0">
    </div>
    <br>
    <button type="submit">Enviar Solicitud</button>
</form>
</body>
</html>
